app = "atome-voc-frontend"
primary_region = "sin"

[build]
  dockerfile = "frontend/Dockerfile"
  [build.args]
    NEXT_PUBLIC_API_URL = "https://atome-voc-backend.fly.dev"

[env]
  NODE_ENV = "production"
  NEXT_PUBLIC_API_URL = "https://atome-voc-backend.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
